<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <g fill="#eef3f8">
    <rect x="27" y="2" width="10" height="15" rx="2" transform="rotate(0 32 32)"/>
    <rect x="27" y="2" width="10" height="15" rx="2" transform="rotate(45 32 32)"/>
    <rect x="27" y="2" width="10" height="15" rx="2" transform="rotate(90 32 32)"/>
    <rect x="27" y="2" width="10" height="15" rx="2" transform="rotate(135 32 32)"/>
    <rect x="27" y="2" width="10" height="15" rx="2" transform="rotate(180 32 32)"/>
    <rect x="27" y="2" width="10" height="15" rx="2" transform="rotate(225 32 32)"/>
    <rect x="27" y="2" width="10" height="15" rx="2" transform="rotate(270 32 32)"/>
    <rect x="27" y="2" width="10" height="15" rx="2" transform="rotate(315 32 32)"/>
  </g>
  <!-- Body drawn as a stroked ring (inner r 8, outer r 19) so the centre hole is
       real transparency, with no <mask>: cairosvg mis-rasterizes the masked form,
       clipping the whole icon to its top-left quadrant. -->
  <circle cx="32" cy="32" r="13.5" fill="none" stroke="#eef3f8" stroke-width="11"/>
</svg>
