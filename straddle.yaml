# spangap-web — HTTPS + auth + WebRTC + the shared browser UI shell.
#
# Browser-side UI activator: when this straddle is in the dep graph (and
# --no-web-ui is not set), the build picks up every other straddle's
# browser/ subdir and includes its init() in the generated browser
# dispatcher. Firmware half holds web/auth/webrtc; browser half holds
# the shared UI shell (FloatingWindow, MenuBar, SettingX, TerminalWindow,
# LogWindow, WebRTC session, auth flow, storage sync, menu registry,
# Pinia stores).
schema_version: 1
name: spangap/spangap-web
prefix: web
version: 0.1.0
firmware: esp-idf
browser: browser
platforms: [idf]
requires:
  - spangap/spangap-net
  # webrtc_task.cpp unconditionally #include's "upnp.h" for external-IP
  # discovery; today that makes upnp a hard dep. Could become
  # optional_requires once the call site is gated on CONFIG_SPANGAP_UPNP.
  - spangap/upnp
# Auto-init: folded into the generated spangapInitStraddles() dispatcher, so a
# --no-web build (spangap-web not staged) simply emits no call — no #if
# CONFIG_SPANGAP_WEB guard in the consumer. web is in the dispatcher's platform
# band (after core + net, see spangap-inside PLATFORM_ORDER): core's storage
# task and net's IP stack are already up, and webrtc follows webInit in listed
# order.
init:
  - call: webInit
  - call: webrtcInit
